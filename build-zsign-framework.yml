name: Build ZSign Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSSL
        run: brew install openssl

      - name: Compile ZSign dylib
        run: |
          OPENSSL_PREFIX=$(brew --prefix openssl)

          CPP_FILES=$(find zsign/ -name "*.cpp")

          clang++ \
            -std=c++17 \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -install_name @rpath/ZSign.framework/ZSign \
            -I zsign/ \
            -I "$OPENSSL_PREFIX/include" \
            "$OPENSSL_PREFIX/lib/libssl.a" \
            "$OPENSSL_PREFIX/lib/libcrypto.a" \
            $CPP_FILES \
            -o ZSign

      - name: Package as framework
        run: |
          mkdir -p ZSign.framework/Headers

          # Binary
          cp ZSign ZSign.framework/ZSign

          # Headers
          cp zsign/*.h ZSign.framework/Headers/ 2>/dev/null || true

          # Info.plist
          cat > ZSign.framework/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ZSign</string>
              <key>CFBundleIdentifier</key>
              <string>com.lc.zsign</string>
              <key>CFBundleName</key>
              <string>ZSign</string>
              <key>CFBundlePackageType</key>
              <string>FMWK</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Codesign
        run: codesign --force --sign - ZSign.framework

      - name: Zip
        run: zip -r ZSign.framework.zip ZSign.framework

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.framework
          path: ZSign.framework.zip

      - name: Create release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zsign-${{ github.sha }}
          name: ZSign Framework
          files: ZSign.framework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
