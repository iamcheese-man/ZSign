name: Build ZSign

on:
  workflow_dispatch:
    inputs:
      output_type:
        description: 'Output type'
        required: true
        default: 'both'
        type: choice
        options:
          - dylib
          - framework
          - both

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get prebuilt OpenSSL for iOS
        run: |
          git clone --depth 1 https://github.com/krzyzanowskim/OpenSSL.git openssl-ios-src
          mkdir -p openssl-ios/lib openssl-ios/include
          cp openssl-ios-src/iphoneos/lib/libcrypto.a openssl-ios/lib/libcrypto.a
          cp openssl-ios-src/iphoneos/lib/libssl.a    openssl-ios/lib/libssl.a
          cp -r openssl-ios-src/iphoneos/include/openssl openssl-ios/include/openssl

      - name: Compile sources
        run: |
          OPENSSL_PREFIX="$PWD/openssl-ios"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build

          SRC_FILES=$(find . -maxdepth 1 -type f \( \
            -name '*.cpp' -o -name '*.c' -o -name '*.cc' -o \
            -name '*.cxx' -o -name '*.m'  -o -name '*.mm' \
          \))

          COMMON_FLAGS="\
            -std=c++20 \
            -fobjc-arc \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -I . \
            -I $OPENSSL_PREFIX/include \
            $OPENSSL_PREFIX/lib/libssl.a \
            $OPENSSL_PREFIX/lib/libcrypto.a \
            -framework Foundation"

          # --- dylib ---
          if [ "${{ github.event.inputs.output_type }}" = "dylib" ] || [ "${{ github.event.inputs.output_type }}" = "both" ]; then
            echo "Building ZSign.dylib..."
            clang++ $COMMON_FLAGS \
              -dynamiclib \
              -install_name @rpath/ZSign.dylib \
              $SRC_FILES \
              -o build/ZSign.dylib
            echo "dylib done"
          fi

          # --- framework ---
          if [ "${{ github.event.inputs.output_type }}" = "framework" ] || [ "${{ github.event.inputs.output_type }}" = "both" ]; then
            echo "Building ZSign.framework..."
            FRAMEWORK_DIR="build/ZSign.framework"
            mkdir -p "$FRAMEWORK_DIR/Headers"

            clang++ $COMMON_FLAGS \
              -dynamiclib \
              -install_name @rpath/ZSign.framework/ZSign \
              $SRC_FILES \
              -o "$FRAMEWORK_DIR/ZSign"

            find . -maxdepth 1 -type f \( -name '*.h' -o -name '*.hpp' \) \
              -exec cp {} "$FRAMEWORK_DIR/Headers/" \;

            cp Info.plist "$FRAMEWORK_DIR/Info.plist"
            codesign --force --sign - "$FRAMEWORK_DIR"
            echo "framework done"
          fi

      - name: Package artifacts
        run: |
          cd build
          if [ "${{ github.event.inputs.output_type }}" = "dylib" ] || [ "${{ github.event.inputs.output_type }}" = "both" ]; then
            zip ZSign.dylib.zip ZSign.dylib
          fi
          if [ "${{ github.event.inputs.output_type }}" = "framework" ] || [ "${{ github.event.inputs.output_type }}" = "both" ]; then
            ditto -c -k --sequesterRsrc --keepParent ZSign.framework ZSign.framework.zip
          fi

      - name: Upload dylib
        if: ${{ github.event.inputs.output_type == 'dylib' || github.event.inputs.output_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.dylib
          path: build/ZSign.dylib.zip
          retention-days: 14

      - name: Upload framework
        if: ${{ github.event.inputs.output_type == 'framework' || github.event.inputs.output_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.framework
          path: build/ZSign.framework.zip
          retention-days: 14
