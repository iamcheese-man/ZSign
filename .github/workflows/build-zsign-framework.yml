name: Build ZSign Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSSL
        run: brew install openssl

      - name: Compile ZSign dylib
        run: |
          set -euxo pipefail

          OPENSSL_PREFIX=$(brew --prefix openssl)
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

          # Find ALL source files except .github
          find . -type f ! -path "./.github/*" \( \
            -name "*.cpp" -o \
            -name "*.c" -o \
            -name "*.cxx" -o \
            -name "*.cc" -o \
            -name "*.mm" -o \
            -name "*.m" \
          \) -print0 > sources.txt

          echo "Source files:"
          tr '\0' '\n' < sources.txt

          # Compile everything as Objective-C++ (.mm) or C++ 
          xargs -0 clang++ -std=c++17 -fobjc-arc -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -install_name @rpath/ZSign.framework/ZSign \
            -I . -I ./common \
            -L "$OPENSSL_PREFIX/lib" -lssl -lcrypto \
            -framework Foundation -framework Security -framework CoreFoundation \
            -o ZSign < sources.txt

      - name: Package as framework
        run: |
          set -euxo pipefail
          mkdir -p ZSign.framework/Headers
          
          # Binary
          cp ZSign ZSign.framework/ZSign

          # Headers: copy all except .github
          find . -type f ! -path "./.github/*" \( -name "*.h" -o -name "*.hpp" \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" ZSign.framework/Headers/
          done

          # Info.plist
          cat > ZSign.framework/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ZSign</string>
              <key>CFBundleIdentifier</key>
              <string>com.ziacml.helper.zsign</string>
              <key>CFBundleName</key>
              <string>ZSign</string>
              <key>CFBundlePackageType</key>
              <string>FMWK</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Codesign
        run: codesign --force --sign - ZSign.framework

      - name: Zip
        run: zip -r ZSign.framework.zip ZSign.framework

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.framework
          path: ZSign.framework.zip

      - name: Create release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zsign-${{ github.sha }}
          name: ZSign Framework
          files: ZSign.framework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
