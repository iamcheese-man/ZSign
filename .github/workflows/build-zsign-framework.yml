name: Build zsign Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSSL
        run: |
          brew update
          brew install openssl

      - name: Build zsign.framework (original compile)
        run: |
          # Everything here is exactly like your previous working command
          OPENSSL_INC=$(brew --prefix openssl)/include
          OPENSSL_LIB=$(brew --prefix openssl)/lib

          FRAMEWORK_NAME="zsign"
          BUILD_DIR="$PWD/build/$FRAMEWORK_NAME.framework"

          mkdir -p "$BUILD_DIR/Versions/A"
          mkdir -p "$BUILD_DIR/Versions/A/Headers"
          mkdir -p "$BUILD_DIR/Versions/A/Resources"

          # Use the same source files exactly as before (order matters)
          clang++ \
            -std=c++20 -fobjc-arc -dynamiclib \
            -arch arm64 \
            Utils.mm \
            archo.cpp \
            base64.cpp \
            bundle.cpp \
            fs.cpp \
            log.cpp \
            macho.cpp \
            signing.cpp \
            timer.cpp \
            util.cpp \
            zsign.mm \
            zsigner.mm \
            -I. -I"$OPENSSL_INC" \
            -L"$OPENSSL_LIB" -lssl -lcrypto -framework Foundation \
            -o "$BUILD_DIR/Versions/A/$FRAMEWORK_NAME"

          # Copy headers (exactly as before)
          cp *.h "$BUILD_DIR/Versions/A/Headers/" || true
          cp *.hpp "$BUILD_DIR/Versions/A/Headers/" || true

          # Copy other resources
          cp README.md "$BUILD_DIR/Versions/A/Resources/" || true

          # Set symlinks
          ln -sfn A "$BUILD_DIR/Versions/Current"
          ln -sfn Versions/Current/$FRAMEWORK_NAME "$BUILD_DIR/$FRAMEWORK_NAME"
          ln -sfn Versions/Current/Headers "$BUILD_DIR/Headers"
          ln -sfn Versions/Current/Resources "$BUILD_DIR/Resources"

      - name: Zip zsign.framework
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent zsign.framework zsign.framework.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zsign.framework
          path: build/zsign.framework.zip
