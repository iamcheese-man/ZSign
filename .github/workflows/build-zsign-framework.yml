name: Build ZSign

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Homebrew OpenSSL
        run: brew install openssl@3

      - name: Set environment variables
        run: |
          echo "OPENSSL_PREFIX=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      - name: Compile ZSign
        run: |
          set -euxo pipefail

          # Collect all include directories recursively
          INCLUDE_DIRS=$(find . -type d ! -path "./.github/*" -exec printf " -I%s" {} \;)

          # Collect all source files recursively
          SRC_FILES=$(find . -type f ! -path "./.github/*" \( -name '*.cpp' -o -name '*.c' -o -name '*.cxx' -o -name '*.cc' -o -name '*.mm' -o -name '*.m' \))

          echo "Compiling ZSign with sources:"
          echo "$SRC_FILES"

          clang++ -std=c++17 -fobjc-arc -arch arm64 \
            -isysroot "$SDK_PATH" -miphoneos-version-min=14.0 \
            -dynamiclib -install_name @rpath/ZSign.framework/ZSign \
            $INCLUDE_DIRS -I"$OPENSSL_PREFIX/include" \
            -L"$OPENSSL_PREFIX/lib" -lssl -lcrypto \
            -framework Foundation -framework Security -framework CoreFoundation \
            $SRC_FILES -o ZSign
