name: Build Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get prebuilt OpenSSL for iOS
        run: |
          git clone --depth 1 https://github.com/krzyzanowskim/OpenSSL.git openssl-ios-src
          echo "Repo structure:"
          find openssl-ios-src -name "*.a" | head -20
          find openssl-ios-src -name "openssl" -type d | head -5
          mkdir -p openssl-ios/lib openssl-ios/include
          CRYPTO=$(find openssl-ios-src -name "libcrypto*.a" | grep -i iphone | head -1)
          SSL=$(find openssl-ios-src -name "libssl*.a" | grep -i iphone | head -1)
          HEADERS=$(find openssl-ios-src -type d -name "openssl" | head -1)
          echo "Found: $CRYPTO $SSL $HEADERS"
          cp "$CRYPTO" openssl-ios/lib/libcrypto.a
          cp "$SSL" openssl-ios/lib/libssl.a
          cp -r "$HEADERS" openssl-ios/include/openssl

      - name: Build Framework
        run: |
          OPENSSL_PREFIX="$PWD/openssl-ios"
          FRAMEWORK_NAME="ZSign"
          BUILD_DIR="$PWD/build/$FRAMEWORK_NAME.framework"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          mkdir -p "$BUILD_DIR/Headers"

          echo "Finding source files..."
          SRC_FILES=$(find . -maxdepth 1 -type f \( \
            -name '*.cpp' -o -name '*.c' -o -name '*.cc' -o \
            -name '*.cxx' -o -name '*.m' -o -name '*.mm' \
          \))
          echo "$SRC_FILES"

          echo "Compiling..."
          clang++ \
            -std=c++20 \
            -fobjc-arc \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -install_name @rpath/$FRAMEWORK_NAME.framework/$FRAMEWORK_NAME \
            -I . \
            -I "$OPENSSL_PREFIX/include" \
            "$OPENSSL_PREFIX/lib/libssl.a" \
            "$OPENSSL_PREFIX/lib/libcrypto.a" \
            -framework Foundation \
            $SRC_FILES \
            -o "$BUILD_DIR/$FRAMEWORK_NAME"

          echo "Copying headers..."
          find . -maxdepth 1 -type f \( -name '*.h' -o -name '*.hpp' \) \
            -exec cp {} "$BUILD_DIR/Headers/" \;

          echo "Generating Info.plist..."
          cat > "$BUILD_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ZSign</string>
              <key>CFBundleIdentifier</key>
              <string>com.lc.zsign</string>
              <key>CFBundleName</key>
              <string>ZSign</string>
              <key>CFBundlePackageType</key>
              <string>FMWK</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST

          echo "Codesigning..."
          codesign --force --sign - "$BUILD_DIR"

      - name: Zip Framework
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ZSign.framework ZSign.framework.zip
          ls -lh ZSign.framework.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.framework
          path: build/ZSign.framework.zip
