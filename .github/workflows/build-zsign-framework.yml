name: Build Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get prebuilt OpenSSL for iOS
        run: |
          git clone --depth 1 https://github.com/krzyzanowskim/OpenSSL.git openssl-ios-src
          mkdir -p openssl-ios/lib openssl-ios/include
          cp openssl-ios-src/iphoneos/lib/libcrypto.a openssl-ios/lib/libcrypto.a
          cp openssl-ios-src/iphoneos/lib/libssl.a openssl-ios/lib/libssl.a
          cp -r openssl-ios-src/iphoneos/include/openssl openssl-ios/include/openssl

      - name: Build ZSign Framework
        run: |
          OPENSSL_PREFIX="$PWD/openssl-ios"
          FRAMEWORK_NAME="ZSign"
          BUILD_DIR="$PWD/build/$FRAMEWORK_NAME.framework"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          mkdir -p "$BUILD_DIR/Headers"

          SRC_FILES=$(find . -maxdepth 1 -type f \( \
            -name '*.cpp' -o -name '*.c' -o -name '*.cc' -o \
            -name '*.cxx' -o -name '*.m' -o -name '*.mm' \
          \))

          clang++ \
            -std=c++20 \
            -fobjc-arc \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -install_name @rpath/$FRAMEWORK_NAME.framework/$FRAMEWORK_NAME \
            -I . \
            -I "$OPENSSL_PREFIX/include" \
            "$OPENSSL_PREFIX/lib/libssl.a" \
            "$OPENSSL_PREFIX/lib/libcrypto.a" \
            -framework Foundation \
            $SRC_FILES \
            -o "$BUILD_DIR/$FRAMEWORK_NAME"

          find . -maxdepth 1 -type f \( -name '*.h' -o -name '*.hpp' \) \
            -exec cp {} "$BUILD_DIR/Headers/" \;

          cp Info.plist "$BUILD_DIR/Info.plist"



          codesign --force --sign - "$BUILD_DIR"

      # ZSign.framework is at: $PWD/build/ZSign.framework
      # To use in a dylib build step add:
      #   -F $PWD/build -framework ZSign -I $PWD/build/ZSign.framework/Headers

      - name: Zip Framework
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ZSign.framework ZSign.framework.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZSign.framework
          path: build/ZSign.framework.zip
