name: Build Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Build Framework
        run: |
          OPENSSL_INC=$(brew --prefix openssl)/include
          OPENSSL_LIB=$(brew --prefix openssl)/lib

          FRAMEWORK_NAME="MyFramework"
          BUILD_DIR="$PWD/build/$FRAMEWORK_NAME.framework"

          mkdir -p "$BUILD_DIR/Headers"
          mkdir -p "$BUILD_DIR/Versions/A"
          mkdir -p "$BUILD_DIR/Resources"

          # Include root and the single subfolder
          INCLUDE_PATHS="-I. -Icommon -I$OPENSSL_INC"

          # Find all source files in root and subfolder
          SRC_FILES=$(find . -maxdepth 2 -type f \( -name '*.cpp' -o -name '*.c' -o -name '*.cc' -o -name '*.cxx' -o -name '*.m' -o -name '*.mm' \))

          # Compile dynamic library
          clang++ -std=c++20 -fobjc-arc -dynamiclib $SRC_FILES $INCLUDE_PATHS \
              -L"$OPENSSL_LIB" -lssl -lcrypto -framework Foundation \
              -o "$BUILD_DIR/Versions/A/$FRAMEWORK_NAME"

          # Copy headers
          find . -maxdepth 2 -type f -name '*.h' -exec cp {} "$BUILD_DIR/Headers/" \;

          # Copy all other files to Resources
          find . -maxdepth 2 -type f ! -name '*.cpp' ! -name '*.c' ! -name '*.cc' ! -name '*.cxx' ! -name '*.m' ! -name '*.mm' ! -name '*.h' \
            -exec cp --parents {} "$BUILD_DIR/Resources/" \;

          # Set up symlinks
          ln -sfn A "$BUILD_DIR/Versions/Current"
          ln -sfn Versions/Current/$FRAMEWORK_NAME "$BUILD_DIR/$FRAMEWORK_NAME"
          ln -sfn Versions/Current/Headers "$BUILD_DIR/Headers"
          ln -sfn Versions/Current/Resources "$BUILD_DIR/Resources"

      - name: List built framework
        run: ls -R build
