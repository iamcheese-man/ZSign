name: Build Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install OpenSSL
        run: |
          brew update
          brew install openssl

      - name: Compile all files into a single Framework
        run: |
          OPENSSL_INC=$(brew --prefix openssl)/include
          OPENSSL_LIB=$(brew --prefix openssl)/lib

          FRAMEWORK_NAME="ZSign"
          FRAMEWORK_DIR="$PWD/build/$FRAMEWORK_NAME.framework"

          mkdir -p "$FRAMEWORK_DIR/Headers"
          mkdir -p "$FRAMEWORK_DIR/Versions/A"

          echo "Collecting all files recursively..."
          ALL_FILES=$(find . -type f)

          echo "Compiling into $FRAMEWORK_NAME.framework..."
          clang++ -std=c++20 -dynamiclib -o "$FRAMEWORK_DIR/Versions/A/$FRAMEWORK_NAME" $ALL_FILES \
              -I"$OPENSSL_INC" -L"$OPENSSL_LIB" -lssl -lcrypto -framework Foundation

          echo "Copying headers..."
          find . -type f -name '*.h' -exec cp {} "$FRAMEWORK_DIR/Headers/" \;

          echo "Setting up symlinks..."
          ln -sfn A "$FRAMEWORK_DIR/Versions/Current"
          ln -sfn Versions/Current/$FRAMEWORK_NAME "$FRAMEWORK_DIR/$FRAMEWORK_NAME"
          ln -sfn Versions/Current/Headers "$FRAMEWORK_DIR/Headers"

      - name: List generated framework
        run: ls -R build
